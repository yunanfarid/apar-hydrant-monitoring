<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Status Asset - SIAPA</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f3f4f6;
    margin:0;
    padding:30px;
}

.card{
    max-width:600px;
    margin:auto;
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.logo{
    width:180px;
    display:block;
    margin:auto;
    margin-bottom:20px;
}

.info{
    font-size:20px;
    font-weight:bold;
    text-align:center;
}

.small{
    color:#6b7280;
    text-align:center;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<img src="logo-siapa.png"
     class="logo">

<div class="info"
     id="asset-code">

Loading...

</div>

<div class="small">

Halaman status asset SIAPA

</div>

</div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxcV_xS4EHDaPf5y9JgjHRB6yn_brFtSOnqrHSHAFB1OTUwWIs2agar9NsvK7S4mX_z/exec";

const params =
new URLSearchParams(
    window.location.search
);

const assetId =
params.get("id");

loadAsset();

async function loadAsset(){

  if(!assetId){

    document.getElementById(
      "asset-code"
    ).textContent =
    "Asset Tidak Ditemukan";

    return;

  }

  try{

    const response =
      await fetch(
        GAS_URL,
        {
          method:"POST",
          headers:{
            "Content-Type":
            "text/plain;charset=utf-8"
          },
          body:JSON.stringify({
            action:"getPublicAsset",
            payload:{
              barcode:assetId
            }
          })
        }
      );

    const result =
      await response.json();

    if(!result.ok){

      throw new Error(
        result.error
      );

    }

    renderAsset(
      result.data
    );

  }catch(error){

    document.getElementById(
      "asset-code"
    ).innerHTML =
    `
      Gagal memuat data asset
      <br><br>
      ${error.message}
    `;

  }

}
function renderAsset(data){
      let tanggalFormatted = "-";

  if(
    data.inspectionDate &&
    data.inspectionDate !== "-"
  ){

    const d =
      new Date(
        data.inspectionDate
      );

    tanggalFormatted =
      d.toLocaleString(
        "id-ID",
        {
          day:"2-digit",
          month:"long",
          year:"numeric",
          hour:"2-digit",
          minute:"2-digit"
        }
      ) + " WIB";

  }
  let icon = "🧯";

  if(data.type === "HYDRANT_INDOOR"){
    icon = "🚰";
  }

  if(data.type === "HYDRANT_OUTDOOR"){
    icon = "🚒";
  }

  const statusColor =
    data.status === "SUDAH DIPERIKSA"
    ? "#16a34a"
    : data.status === "ADA TEMUAN"
    ? "#f59e0b"
    : "#ef4444";

  let statusIcon = "❌";

if(data.status === "SUDAH DIPERIKSA"){
  statusIcon = "✅";
}

if(data.status === "ADA TEMUAN"){
  statusIcon = "⚠";
}
let findingHtml = "Tidak Ada";

if(
  data.findingDetails &&
  data.findingDetails.length
){

  findingHtml =
    data.findingDetails
      .map(
        f =>
          `• ${f.name}(${f.type})`
      )
      .join("<br>");

}
  document.getElementById(
    "asset-code"
  ).innerHTML =
  `
    <div style="font-size:32px;">
      ${icon}
    </div>

    <div style="
      margin-top:10px;
      font-size:22px;
      font-weight:bold;
    ">
      ${data.type} #${data.number}
    </div>

    <div style="
    margin-top:15px;
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    background:${statusColor}15;
    color:${statusColor};
    font-weight:700;
    font-size:16px;
">
    ${statusIcon} ${data.status}
</div>

    <div style="
      margin-top:20px;
      text-align:left;
      line-height:2;
      font-size:16px;
    ">

      <b>Jenis :</b>
      ${data.jenis || "-"}

      <br>

      <b>Lokasi :</b>
      ${data.lokasi || "-"}

      <br>

      <b>Tanggal Pemeriksaan :</b>
      ${tanggalFormatted}

      <br>

      <b>Checker :</b>
      ${data.checker}

      <br>

      <b>Temuan :</b>
      <br>
      ${findingHtml}

    </div>
  `;
}

</script>

</body>
</html>
